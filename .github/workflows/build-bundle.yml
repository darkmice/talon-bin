name: Build Talon Modules

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      talon_core_ref:
        description: 'Talon Core (superclaw-db) git ref (tag/branch/sha)'
        required: true
        default: 'main'
      talon_ai_ref:
        description: 'Talon AI git ref (tag/branch/sha)'
        required: true
        default: 'main'
      talon_llm_ref:
        description: 'Talon LLM git ref (tag/branch/sha)'
        required: true
        default: 'main'
      talon_agent_ref:
        description: 'Talon Agent git ref (tag/branch/sha)'
        required: true
        default: 'main'
      talon_trace_ref:
        description: 'Talon Trace git ref (tag/branch/sha)'
        required: true
        default: 'main'
      talon_sandbox_ref:
        description: 'Talon Sandbox git ref (tag/branch/sha)'
        required: true
        default: 'main'
      talon_evocore_ref:
        description: 'Talon EvoCore git ref (tag/branch/sha)'
        required: true
        default: 'main'
      release_tag:
        description: 'Release tag name (e.g. v0.1.17)'
        required: true
        default: 'v0.1.18'

env:
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
  CORE_REF: ${{ inputs.talon_core_ref || 'main' }}
  AI_REF: ${{ inputs.talon_ai_ref || 'main' }}
  LLM_REF: ${{ inputs.talon_llm_ref || 'main' }}
  AGENT_REF: ${{ inputs.talon_agent_ref || 'main' }}
  TRACE_REF: ${{ inputs.talon_trace_ref || 'main' }}
  SANDBOX_REF: ${{ inputs.talon_sandbox_ref || 'main' }}
  EVOCORE_REF: ${{ inputs.talon_evocore_ref || 'main' }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-amd64
            archive_suffix: linux-amd64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: so
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-arm64
            archive_suffix: linux-arm64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: so
          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: talon-macos-amd64
            archive_suffix: macos-amd64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: dylib
          - target: aarch64-apple-darwin
            os: macos-15
            name: talon-macos-arm64
            archive_suffix: macos-arm64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: dylib
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: talon-windows-amd64
            archive_suffix: windows-amd64
            lib_prefix: ""
            lib_ext: lib
            dylib_ext: dll
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: talon-windows-arm64
            archive_suffix: windows-arm64
            lib_prefix: ""
            lib_ext: lib
            dylib_ext: dll
          - target: loongarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-loongarch64
            archive_suffix: linux-loongarch64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: so
            use_cross: true
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-riscv64
            archive_suffix: linux-riscv64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: so
            use_cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Verify TALON_AI_TOKEN is set
        shell: bash
        run: |
          if [ -z "${{ secrets.TALON_AI_TOKEN }}" ]; then
            echo "::error::TALON_AI_TOKEN secret is not configured. Cannot checkout private repos."
            exit 1
          fi

      - name: Checkout talon-bin
        uses: actions/checkout@v4
        with:
          path: talon-bin

      - name: Checkout Talon Core (private)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-core
          ref: ${{ env.CORE_REF }}
          token: ${{ secrets.TALON_AI_TOKEN }}
          path: superclaw-db

      - name: Checkout Talon AI (private)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-ai
          ref: ${{ env.AI_REF }}
          token: ${{ secrets.TALON_AI_TOKEN }}
          path: talon-ai

      - name: Checkout Talon LLM (private)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-llm
          ref: ${{ env.LLM_REF }}
          token: ${{ secrets.TALON_AI_TOKEN }}
          path: talon-llm

      - name: Checkout Talon Agent (private)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-agent
          ref: ${{ env.AGENT_REF }}
          token: ${{ secrets.TALON_AI_TOKEN }}
          path: talon-agent

      - name: Checkout Talon Trace (private)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-trace
          ref: ${{ env.TRACE_REF }}
          token: ${{ secrets.TALON_AI_TOKEN }}
          path: talon-trace

      - name: Checkout Talon Sandbox (private)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-sandbox
          ref: ${{ env.SANDBOX_REF }}
          token: ${{ secrets.TALON_AI_TOKEN }}
          path: talon-sandbox

      - name: Checkout Talon EvoCore (private)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-evocore
          ref: ${{ env.EVOCORE_REF }}
          token: ${{ secrets.TALON_AI_TOKEN }}
          path: talon-evo-core

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (apt)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross (Docker-based)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ─── Build core-only ────────────────────────────────────────────────

      - name: Build Talon Core (cargo)
        if: matrix.use_cross != true
        working-directory: superclaw-db
        run: cargo build --release --lib --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build Talon Core (cross)
        if: matrix.use_cross == true
        working-directory: superclaw-db
        run: cross build --release --lib --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build Talon Core binaries (cargo)
        if: matrix.use_cross != true
        working-directory: superclaw-db
        run: cargo build --release --bins --features pgwire-server --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build Talon Core binaries (cross)
        if: matrix.use_cross == true
        working-directory: superclaw-db
        run: cross build --release --bins --features pgwire-server --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      # ─── Build default bundle: core + ai + llm + agent ─────────────────

      - name: Build talon-bundle (cargo)
        if: matrix.use_cross != true
        working-directory: talon-bin/talon-bundle
        run: cargo build --release --features pgwire-server --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build talon-bundle (cross)
        if: matrix.use_cross == true
        working-directory: talon-bin/talon-bundle
        run: cross build --release --features pgwire-server --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build talon-server (cargo)
        if: matrix.use_cross != true
        working-directory: talon-bin/talon-server
        run: cargo build --release --features pgwire-server --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build talon-server (cross)
        if: matrix.use_cross == true
        working-directory: talon-bin/talon-server
        run: cross build --release --features pgwire-server --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      # ─── Build full bundle: default stack + trace + sandbox + evocore ──

      - name: Skip full bundle on cross-only targets
        if: matrix.use_cross == true
        run: echo "Skipping full bundle for ${{ matrix.target }}"

      - name: Build talon-bundle-evocore (full bundle)
        if: matrix.use_cross != true
        working-directory: talon-bin/talon-bundle-evocore
        run: cargo build --release --features pgwire-server --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build talon-server-full (cargo)
        if: matrix.use_cross != true
        working-directory: talon-bin/talon-server-full
        run: cargo build --release --features pgwire-server --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      # ─── Package binaries ──────────────────────────────────────────────

      - name: Package Talon Core binaries (Unix)
        if: runner.os != 'Windows'
        working-directory: talon-bin
        run: |
          mkdir -p dist-bin-core
          cp ../superclaw-db/target/${{ matrix.target }}/release/talon dist-bin-core/ 2>/dev/null || true
          cp ../superclaw-db/target/${{ matrix.target }}/release/talon-cli dist-bin-core/ 2>/dev/null || true
          cp ../superclaw-db/target/${{ matrix.target }}/release/talon-tui dist-bin-core/ 2>/dev/null || true
          cd dist-bin-core && tar czf talon-core-${{ matrix.archive_suffix }}.tar.gz * && cd ..

      - name: Package Talon Core binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: talon-bin
        run: |
          New-Item -ItemType Directory -Force -Path dist-bin-core
          Copy-Item ../superclaw-db/target/${{ matrix.target }}/release/talon.exe dist-bin-core/talon.exe -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/target/${{ matrix.target }}/release/talon-cli.exe dist-bin-core/talon-cli.exe -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/target/${{ matrix.target }}/release/talon-tui.exe dist-bin-core/talon-tui.exe -ErrorAction SilentlyContinue
          cd dist-bin-core; tar czf talon-core-${{ matrix.archive_suffix }}.tar.gz *; cd ..

      - name: Package default bundle binaries (Unix)
        if: runner.os != 'Windows'
        working-directory: talon-bin
        run: |
          mkdir -p dist-bin-default
          cp talon-server/target/${{ matrix.target }}/release/talon dist-bin-default/ 2>/dev/null || true
          cp ../superclaw-db/target/${{ matrix.target }}/release/talon-cli dist-bin-default/ 2>/dev/null || true
          cp ../superclaw-db/target/${{ matrix.target }}/release/talon-tui dist-bin-default/ 2>/dev/null || true
          cd dist-bin-default && tar czf talon-${{ matrix.archive_suffix }}.tar.gz * && cd ..

      - name: Package default bundle binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: talon-bin
        run: |
          New-Item -ItemType Directory -Force -Path dist-bin-default
          Copy-Item talon-server/target/${{ matrix.target }}/release/talon.exe dist-bin-default/talon.exe -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/target/${{ matrix.target }}/release/talon-cli.exe dist-bin-default/talon-cli.exe -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/target/${{ matrix.target }}/release/talon-tui.exe dist-bin-default/talon-tui.exe -ErrorAction SilentlyContinue
          cd dist-bin-default; tar czf talon-${{ matrix.archive_suffix }}.tar.gz *; cd ..

      - name: Package full bundle binaries (Unix)
        if: runner.os != 'Windows' && matrix.use_cross != true
        working-directory: talon-bin
        run: |
          mkdir -p dist-bin-full
          cp talon-server-full/target/${{ matrix.target }}/release/talon dist-bin-full/ 2>/dev/null || true
          cp ../superclaw-db/target/${{ matrix.target }}/release/talon-cli dist-bin-full/ 2>/dev/null || true
          cp ../superclaw-db/target/${{ matrix.target }}/release/talon-tui dist-bin-full/ 2>/dev/null || true
          cd dist-bin-full && tar czf talon-full-${{ matrix.archive_suffix }}.tar.gz * && cd ..

      - name: Package full bundle binaries (Windows)
        if: runner.os == 'Windows' && matrix.use_cross != true
        shell: pwsh
        working-directory: talon-bin
        run: |
          New-Item -ItemType Directory -Force -Path dist-bin-full
          Copy-Item talon-server-full/target/${{ matrix.target }}/release/talon.exe dist-bin-full/talon.exe -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/target/${{ matrix.target }}/release/talon-cli.exe dist-bin-full/talon-cli.exe -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/target/${{ matrix.target }}/release/talon-tui.exe dist-bin-full/talon-tui.exe -ErrorAction SilentlyContinue
          cd dist-bin-full; tar czf talon-full-${{ matrix.archive_suffix }}.tar.gz *; cd ..

      # ─── Package libraries ─────────────────────────────────────────────

      - name: Package Talon Core (Unix)
        if: runner.os != 'Windows'
        working-directory: talon-bin
        run: |
          mkdir -p dist-core
          cp ../superclaw-db/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon.${{ matrix.lib_ext }} dist-core/${{ matrix.lib_prefix }}talon.${{ matrix.lib_ext }} 2>/dev/null || true
          cp ../superclaw-db/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon.${{ matrix.dylib_ext }} dist-core/${{ matrix.lib_prefix }}talon.${{ matrix.dylib_ext }} 2>/dev/null || true
          cp ../superclaw-db/include/talon.h dist-core/ 2>/dev/null || true
          cd dist-core && tar czf libtalon-core-${{ matrix.archive_suffix }}.tar.gz * && cd ..

      - name: Package Talon Core (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: talon-bin
        run: |
          New-Item -ItemType Directory -Force -Path dist-core
          Copy-Item ../superclaw-db/target/${{ matrix.target }}/release/talon.lib dist-core/talon.lib -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/target/${{ matrix.target }}/release/talon.dll dist-core/talon.dll -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/include/talon.h dist-core/ -ErrorAction SilentlyContinue
          cd dist-core; tar czf libtalon-core-${{ matrix.archive_suffix }}.tar.gz *; cd ..

      - name: Package talon-bundle (Unix)
        if: runner.os != 'Windows'
        working-directory: talon-bin
        run: |
          mkdir -p dist-lib
          cp talon-bundle/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon_bundle.${{ matrix.lib_ext }} dist-lib/${{ matrix.lib_prefix }}talon.${{ matrix.lib_ext }} 2>/dev/null || true
          cp talon-bundle/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon_bundle.${{ matrix.dylib_ext }} dist-lib/${{ matrix.lib_prefix }}talon.${{ matrix.dylib_ext }} 2>/dev/null || true
          cp ../superclaw-db/include/talon.h dist-lib/ 2>/dev/null || true
          cd dist-lib && tar czf libtalon-${{ matrix.archive_suffix }}.tar.gz * && cd ..

      - name: Package talon-bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: talon-bin
        run: |
          New-Item -ItemType Directory -Force -Path dist-lib
          Copy-Item talon-bundle/target/${{ matrix.target }}/release/talon_bundle.lib dist-lib/talon.lib -ErrorAction SilentlyContinue
          Copy-Item talon-bundle/target/${{ matrix.target }}/release/talon_bundle.dll dist-lib/talon.dll -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/include/talon.h dist-lib/ -ErrorAction SilentlyContinue
          cd dist-lib; tar czf libtalon-${{ matrix.archive_suffix }}.tar.gz *; cd ..

      - name: Verify Windows default bundle symbols
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: talon-bin
        run: |
          $libFile = "dist-lib/talon.lib"
          $fileSize = (Get-Item $libFile).Length
          Write-Host "talon.lib size: $fileSize bytes"
          if ($fileSize -lt 1048576) {
            Write-Error "talon.lib is suspiciously small ($fileSize bytes). Might be a cdylib import library instead of staticlib!"
            exit 1
          }
          $dumpbin = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -find "**/dumpbin.exe" | Select-Object -First 1
          if ($dumpbin) {
            Write-Host "Found dumpbin: $dumpbin"
            $exports = & $dumpbin /LINKERMEMBER dist-lib/talon.lib 2>&1 | Select-String "talon_bundle_init_ai"
            if (-not $exports) {
              Write-Warning "talon_bundle_init_ai not found via dumpbin /LINKERMEMBER. Checking /SYMBOLS..."
              $symbols = & $dumpbin /SYMBOLS dist-lib/talon.lib 2>&1 | Select-String "talon_bundle_init_ai"
              if (-not $symbols) {
                Write-Error "CRITICAL: talon_bundle_init_ai not found in talon.lib! This will cause LNK2019 on Windows."
                exit 1
              }
            }
            Write-Host "✓ talon_bundle_init_ai symbol verified in talon.lib"
          } else {
            Write-Warning "dumpbin.exe not found, skipping symbol verification (file size check passed)"
          }

      - name: Package talon-bundle-evocore (full bundle, Unix)
        if: runner.os != 'Windows' && matrix.use_cross != true
        working-directory: talon-bin
        run: |
          mkdir -p dist-full
          cp talon-bundle-evocore/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon_bundle_evocore.${{ matrix.lib_ext }} dist-full/${{ matrix.lib_prefix }}talon.${{ matrix.lib_ext }} 2>/dev/null || true
          cp talon-bundle-evocore/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon_bundle_evocore.${{ matrix.dylib_ext }} dist-full/${{ matrix.lib_prefix }}talon.${{ matrix.dylib_ext }} 2>/dev/null || true
          cp ../superclaw-db/include/talon.h dist-full/ 2>/dev/null || true
          cd dist-full && tar czf libtalon-evocore-${{ matrix.archive_suffix }}.tar.gz * && cd ..

      - name: Package talon-bundle-evocore (full bundle, Windows)
        if: runner.os == 'Windows' && matrix.use_cross != true
        shell: pwsh
        working-directory: talon-bin
        run: |
          New-Item -ItemType Directory -Force -Path dist-full
          Copy-Item talon-bundle-evocore/target/${{ matrix.target }}/release/talon_bundle_evocore.lib dist-full/talon.lib -ErrorAction SilentlyContinue
          Copy-Item talon-bundle-evocore/target/${{ matrix.target }}/release/talon_bundle_evocore.dll dist-full/talon.dll -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/include/talon.h dist-full/ -ErrorAction SilentlyContinue
          cd dist-full; tar czf libtalon-evocore-${{ matrix.archive_suffix }}.tar.gz *; cd ..

      - name: Verify Windows full bundle symbols
        if: runner.os == 'Windows' && matrix.use_cross != true
        shell: pwsh
        working-directory: talon-bin
        run: |
          $libFile = "dist-full/talon.lib"
          $fileSize = (Get-Item $libFile).Length
          Write-Host "talon.lib (full) size: $fileSize bytes"
          if ($fileSize -lt 1048576) {
            Write-Error "talon.lib (full) is suspiciously small ($fileSize bytes). Might be a cdylib import library!"
            exit 1
          }
          $dumpbin = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -find "**/dumpbin.exe" | Select-Object -First 1
          if ($dumpbin) {
            Write-Host "Found dumpbin: $dumpbin"
            $missing = @()
            foreach ($sym in @("talon_bundle_init_ai", "talon_bundle_init_evo")) {
              $found = & $dumpbin /LINKERMEMBER dist-full/talon.lib 2>&1 | Select-String $sym
              if (-not $found) {
                $found = & $dumpbin /SYMBOLS dist-full/talon.lib 2>&1 | Select-String $sym
              }
              if (-not $found) { $missing += $sym }
            }
            if ($missing.Count -gt 0) {
              Write-Error "CRITICAL: Missing symbols in full talon.lib: $($missing -join ', ')"
              exit 1
            }
            Write-Host "✓ All full-bundle symbols verified in talon.lib"
          } else {
            Write-Warning "dumpbin.exe not found, skipping symbol verification (file size check passed)"
          }

      - name: Upload Talon Core binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talon-core-${{ matrix.archive_suffix }}
          path: talon-bin/dist-bin-core/talon-core-${{ matrix.archive_suffix }}.tar.gz

      - name: Upload default bundle binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talon-${{ matrix.archive_suffix }}
          path: talon-bin/dist-bin-default/talon-${{ matrix.archive_suffix }}.tar.gz

      - name: Upload full bundle binary artifacts
        if: matrix.use_cross != true
        uses: actions/upload-artifact@v4
        with:
          name: talon-full-${{ matrix.archive_suffix }}
          path: talon-bin/dist-bin-full/talon-full-${{ matrix.archive_suffix }}.tar.gz

      - name: Upload Talon Core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libtalon-core-${{ matrix.archive_suffix }}
          path: talon-bin/dist-core/libtalon-core-${{ matrix.archive_suffix }}.tar.gz

      - name: Upload default bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libtalon-${{ matrix.archive_suffix }}
          path: talon-bin/dist-lib/libtalon-${{ matrix.archive_suffix }}.tar.gz

      - name: Upload full bundle artifacts
        if: matrix.use_cross != true
        uses: actions/upload-artifact@v4
        with:
          name: libtalon-evocore-${{ matrix.archive_suffix }}
          path: talon-bin/dist-full/libtalon-evocore-${{ matrix.archive_suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Talon ${{ env.RELEASE_TAG }} (Core / Bundle / Full)"
          body: |
            ## Talon ${{ env.RELEASE_TAG }}

            同时发布两类产物：
            - 可直接运行的服务端二进制包
            - 可嵌入的原生库包

            ### Binary packages

            | Archive prefix | Contains | Use case |
            |----------------|----------|----------|
            | `talon-core-*.tar.gz` | core server + `talon-cli` + `talon-tui` | 纯 Talon 服务端 |
            | `talon-*.tar.gz` | default bundle server + `talon-cli` + `talon-tui` | core + ai + llm + agent |
            | `talon-full-*.tar.gz` | full bundle server + `talon-cli` + `talon-tui` | default + trace + sandbox + evocore |

            ### Library packages

            | Archive prefix | Contains | Use case |
            |----------------|----------|----------|
            | `libtalon-core-*.tar.gz` | Talon core only | 纯 Talon 数据引擎，不带 AI / LLM / Agent |
            | `libtalon-*.tar.gz` | Talon core + talon-ai + talon-llm + talon-agent | 默认 Talon bundle |
            | `libtalon-evocore-*.tar.gz` | Default bundle + talon-trace + talon-sandbox + talon-evo-core | 全量 bundle（保留旧前缀做兼容） |

            ### Platform support

            | Platform | Core Binary | Bundle Binary | Full Binary | Core Lib | Bundle Lib | Full Lib |
            |----------|-------------|---------------|-------------|----------|------------|----------|
            | Linux x86_64 | ✅ | ✅ | ✅ | ✅ | ✅ | ✅ |
            | Linux aarch64 | ✅ | ✅ | ✅ | ✅ | ✅ | ✅ |
            | macOS x86_64 | ✅ | ✅ | ✅ | ✅ | ✅ | ✅ |
            | macOS aarch64 | ✅ | ✅ | ✅ | ✅ | ✅ | ✅ |
            | Windows x86_64 | ✅ | ✅ | ✅ | ✅ | ✅ | ✅ |
            | Windows aarch64 | ✅ | ✅ | ✅ | ✅ | ✅ | ✅ |
            | Linux loongarch64 | ✅ | ✅ | - | ✅ | ✅ | - |
            | Linux riscv64 | ✅ | ✅ | - | ✅ | ✅ | - |

            ### Direct server usage

            下载任一 `talon*.tar.gz` 后，直接启动其中的 `talon` 可执行文件即可对外提供 HTTP/TCP 服务。

            ### Rust / FFI usage

            `talon-sys` 默认继续下载 `libtalon-*`（AI Bundle），启用 `evocore` feature 时继续下载 `libtalon-evocore-*`（现在对应 Full Bundle）。

            `libtalon-core-*` 供纯 Talon 原生集成或自定义打包使用。

            ### Verify checksums

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false

  update-talon-sys:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout talon-bin
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download macOS ARM64 default bundle
        uses: actions/download-artifact@v4
        with:
          name: libtalon-macos-arm64
          path: /tmp/artifacts

      - name: Update talon-sys build script
        run: |
          VERSION="${RELEASE_TAG#v}"
          sed -i "s|TALON_LIB_VERSION: &str = \".*\"|TALON_LIB_VERSION: &str = \"${VERSION}\"|" talon-sys/build.rs
          echo "Updated talon-sys to ${VERSION}"
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: update to ${{ env.RELEASE_TAG }} (core / bundle / full)"
            git push
          fi

name: Build Talon Bundle (Core + AI + EvoCore)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      talon_core_ref:
        description: 'Talon Core (superclaw-db) git ref (tag/branch/sha)'
        required: true
        default: 'main'
      talon_ai_ref:
        description: 'Talon AI git ref (tag/branch/sha)'
        required: true
        default: 'main'
      talon_evocore_ref:
        description: 'Talon EvoCore git ref (tag/branch/sha)'
        required: true
        default: 'main'
      release_tag:
        description: 'Release tag name (e.g. v0.1.17)'
        required: true
        default: 'v0.1.18'

env:
  # Unify tag source: tag push uses GITHUB_REF, manual uses input
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
  CORE_REF: ${{ inputs.talon_core_ref || 'main' }}
  AI_REF: ${{ inputs.talon_ai_ref || 'main' }}
  EVOCORE_REF: ${{ inputs.talon_evocore_ref || 'main' }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-amd64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: so
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-arm64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: so
          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: talon-macos-amd64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: dylib
          - target: aarch64-apple-darwin
            os: macos-15
            name: talon-macos-arm64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: dylib
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: talon-windows-amd64
            lib_prefix: ""
            lib_ext: lib
            dylib_ext: dll
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: talon-windows-arm64
            lib_prefix: ""
            lib_ext: lib
            dylib_ext: dll
          - target: loongarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-loongarch64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: so
            use_cross: true
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-riscv64
            lib_prefix: lib
            lib_ext: a
            dylib_ext: so
            use_cross: true

    runs-on: ${{ matrix.os }}

    steps:
      # 0. Fail fast if the private repo token is not configured
      - name: Verify TALON_AI_TOKEN is set
        shell: bash
        run: |
          if [ -z "${{ secrets.TALON_AI_TOKEN }}" ]; then
            echo "::error::TALON_AI_TOKEN secret is not configured. Cannot checkout private repos."
            exit 1
          fi

      # 1. Checkout talon-bin (this repo, contains talon-bundle, talon-bundle-evocore, talon-sys)
      - name: Checkout talon-bin
        uses: actions/checkout@v4
        with:
          path: talon-bin

      # 2. Checkout talon core (public, open source)
      - name: Checkout Talon Core (superclaw-db)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-core
          ref: ${{ env.CORE_REF }}
          path: superclaw-db

      # 3. Checkout talon-ai (private, closed source) — 需要 PAT
      - name: Checkout Talon AI (private)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-ai
          ref: ${{ env.AI_REF }}
          token: ${{ secrets.TALON_AI_TOKEN }}
          path: talon-ai

      # 4. Checkout talon-evo-core (private, closed source) — 需要 PAT
      - name: Checkout Talon EvoCore (private)
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-evocore
          ref: ${{ env.EVOCORE_REF }}
          token: ${{ secrets.TALON_AI_TOKEN }}
          path: talon-evo-core

      # 5. Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 6. Install cross-compilation tools
      - name: Install cross-compilation tools (apt)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross (Docker-based)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ─── Build talon-bundle (core + AI) ─────────────────────────────────

      - name: Build talon-bundle (cargo)
        if: matrix.use_cross != true
        working-directory: talon-bin/talon-bundle
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build talon-bundle (cross)
        if: matrix.use_cross == true
        working-directory: talon-bin/talon-bundle
        run: cross build --release --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      # ─── Build talon-bundle-evocore (core + AI + EvoCore) ───────────────

      - name: Build talon-bundle-evocore (cargo)
        if: matrix.use_cross != true
        working-directory: talon-bin/talon-bundle-evocore
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Build talon-bundle-evocore (cross)
        if: matrix.use_cross == true
        working-directory: talon-bin/talon-bundle-evocore
        run: cross build --release --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      # ─── Package libraries ─────────────────────────────────────────────

      # 7a. Package talon-bundle (libtalon.*)
      - name: Package talon-bundle (Unix)
        if: runner.os != 'Windows'
        working-directory: talon-bin
        run: |
          mkdir -p dist-lib
          # Copy and rename: talon_bundle → talon (external consumers expect libtalon.a)
          cp talon-bundle/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon_bundle.${{ matrix.lib_ext }} dist-lib/${{ matrix.lib_prefix }}talon.${{ matrix.lib_ext }} 2>/dev/null || true
          cp talon-bundle/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon_bundle.${{ matrix.dylib_ext }} dist-lib/${{ matrix.lib_prefix }}talon.${{ matrix.dylib_ext }} 2>/dev/null || true
          cp ../superclaw-db/include/talon.h dist-lib/ 2>/dev/null || true
          cd dist-lib && tar czf libtalon-${{ matrix.name }}.tar.gz * && cd ..

      - name: Package talon-bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: talon-bin
        run: |
          New-Item -ItemType Directory -Force -Path dist-lib
          Copy-Item talon-bundle/target/${{ matrix.target }}/release/talon_bundle.lib dist-lib/talon.lib -ErrorAction SilentlyContinue
          Copy-Item talon-bundle/target/${{ matrix.target }}/release/talon_bundle.dll dist-lib/talon.dll -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/include/talon.h dist-lib/ -ErrorAction SilentlyContinue
          cd dist-lib; tar czf libtalon-${{ matrix.name }}.tar.gz *; cd ..

      # 7b. Package talon-bundle-evocore (libtalon-evocore.*)
      - name: Package talon-bundle-evocore (Unix)
        if: runner.os != 'Windows'
        working-directory: talon-bin
        run: |
          mkdir -p dist-evocore
          # Copy and rename: talon_bundle_evocore → talon (same C ABI, superset of talon-bundle)
          cp talon-bundle-evocore/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon_bundle_evocore.${{ matrix.lib_ext }} dist-evocore/${{ matrix.lib_prefix }}talon.${{ matrix.lib_ext }} 2>/dev/null || true
          cp talon-bundle-evocore/target/${{ matrix.target }}/release/${{ matrix.lib_prefix }}talon_bundle_evocore.${{ matrix.dylib_ext }} dist-evocore/${{ matrix.lib_prefix }}talon.${{ matrix.dylib_ext }} 2>/dev/null || true
          cp ../superclaw-db/include/talon.h dist-evocore/ 2>/dev/null || true
          cd dist-evocore && tar czf libtalon-evocore-${{ matrix.name }}.tar.gz * && cd ..

      - name: Package talon-bundle-evocore (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: talon-bin
        run: |
          New-Item -ItemType Directory -Force -Path dist-evocore
          Copy-Item talon-bundle-evocore/target/${{ matrix.target }}/release/talon_bundle_evocore.lib dist-evocore/talon.lib -ErrorAction SilentlyContinue
          Copy-Item talon-bundle-evocore/target/${{ matrix.target }}/release/talon_bundle_evocore.dll dist-evocore/talon.dll -ErrorAction SilentlyContinue
          Copy-Item ../superclaw-db/include/talon.h dist-evocore/ -ErrorAction SilentlyContinue
          cd dist-evocore; tar czf libtalon-evocore-${{ matrix.name }}.tar.gz *; cd ..

      # 8. Upload artifacts
      - name: Upload talon-bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libtalon-${{ matrix.name }}
          path: talon-bin/dist-lib/libtalon-${{ matrix.name }}.tar.gz

      - name: Upload talon-bundle-evocore artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libtalon-evocore-${{ matrix.name }}
          path: talon-bin/dist-evocore/libtalon-evocore-${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Talon ${{ env.RELEASE_TAG }} (Core + AI + EvoCore)"
          body: |
            ## Talon ${{ env.RELEASE_TAG }}

            AI-native multi-model data engine: SQL + KV + TimeSeries + MQ + Vector + Graph + Geo + FTS + **AI Engine** + **EvoCore**.

            ### Three-tier library architecture (matryoshka)

            ```
            libtalon-evocore.a  ⊃  libtalon.a (with AI)
                 (最全)                (基础+AI)
            ```

            | Library | Contains | Use case |
            |---------|----------|----------|
            | `libtalon-*.tar.gz` | Core + AI Engine | Standard usage |
            | `libtalon-evocore-*.tar.gz` | Core + AI + EvoCore | Self-evolution capabilities |

            ### Platform support

            | Platform | Architecture | Core+AI | Core+AI+EvoCore |
            |----------|-------------|---------|-----------------|
            | Linux | x86_64 | ✅ | ✅ |
            | Linux | aarch64 | ✅ | ✅ |
            | macOS | x86_64 | ✅ | ✅ |
            | macOS | aarch64 (Apple Silicon) | ✅ | ✅ |
            | Windows | x86_64 | ✅ | ✅ |
            | Windows | aarch64 (ARM) | ✅ | ✅ |
            | Linux | loongarch64 (龙芯) | ✅ | ✅ |
            | Linux | riscv64 | ✅ | ✅ |

            ### Rust usage

            **Core + AI (default):**
            ```toml
            [dependencies]
            talon = { git = "https://github.com/darkmice/talon-bin.git", tag = "${{ env.RELEASE_TAG }}", package = "talon-sys" }
            ```

            **Core + AI + EvoCore:**
            ```toml
            [dependencies]
            talon = { git = "https://github.com/darkmice/talon-bin.git", tag = "${{ env.RELEASE_TAG }}", package = "talon-sys", features = ["evocore"] }
            ```

            ### Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false

  update-talon-sys:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout talon-bin
        uses: actions/checkout@v4

      - name: Download macOS ARM64 library
        uses: actions/download-artifact@v4
        with:
          name: libtalon-talon-macos-arm64
          path: /tmp/artifacts

      - name: Update talon-sys build script
        run: |
          # Update the download tag in talon-sys/build.rs
          sed -i "s|TALON_VERSION = \".*\"|TALON_VERSION = \"${{ env.RELEASE_TAG }}\"|" talon-sys/build.rs || true
          echo "Updated talon-sys to ${{ env.RELEASE_TAG }}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: update to ${{ env.RELEASE_TAG }} (Core + AI + EvoCore)"
            git push
          fi
          git tag "${{ env.RELEASE_TAG }}" || true
          git push origin "${{ env.RELEASE_TAG }}" || true
